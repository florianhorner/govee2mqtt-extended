name: Govee2MQTT Bridge (Fork)
image: ghcr.io/florianhorner/govee2mqtt-{arch}
version: "2026.03.28-cce5dc3c"
slug: govee2mqtt
stage: experimental
description: Fork of wez/govee2mqtt with extra device support, crash fixes, and scene cycling. Prefer upstream if you don't need these additions.
url: https://github.com/florianhorner/govee2mqtt
arch:
  - amd64
  - aarch64
init: false
startup: services
services:
  - mqtt:need

apparmor: true

webui: http://[HOST]:[PORT:8056]/assets/index.html
#ingress: true
#ingress_port: 8056

# Host network access is required for LAN discovery
host_network: true

map:
  - type: addon_config
    read_only: false
    path: /app/config

options:
  temperature_scale: "C"

schema:
  temperature_scale: "str?"
  govee_email: "str?"
  govee_password: "password?"
  govee_api_key: "password?"
  mqtt_host: "str?"
  mqtt_port: "int?"
  mqtt_username: "str?"
  mqtt_password: "password?"
  debug_level: "str?"
  no_multicast: "bool?"
  broadcast_all: "bool?"
  global_broadcast: "bool?"
  scan: "str?"
