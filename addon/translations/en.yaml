---
configuration:
  temperature_scale:
    name: Temperature Scale
    description: >-
      Which temperature scale to display in Home Assistant.
      Enter "C" for Celsius or "F" for Fahrenheit.
  govee_email:
    name: Govee Account Email
    description: >-
      Your Govee account email address. Needed for room names, scenes,
      and devices without LAN support. Requires internet on startup.
  govee_password:
    name: Govee Account Password
    description: >-
      Your Govee account password. Used only to authenticate with
      Govee's servers — never sent anywhere else.
  govee_api_key:
    name: Govee API Key
    description: >-
      Your Govee developer API key. Enables scene control, segment
      colors, and music modes. Get one free at
      https://developer.govee.com/reference/apply-you-govee-api-key.
      Requires internet on startup.

  mqtt_host:
    name: MQTT Broker Host
    description: >-
      Host name or IP address of your MQTT broker.
      Leave blank if you use the Mosquitto app — Home Assistant
      fills this in automatically.
  mqtt_port:
    name: MQTT Broker Port
    description: >-
      Port number of your MQTT broker (default: 1883).
      Leave blank if you use the Mosquitto app.
  mqtt_username:
    name: MQTT Username
    description: >-
      Username for your MQTT broker, if it requires authentication.
      Leave blank if you use the Mosquitto app.
  mqtt_password:
    name: MQTT Password
    description: >-
      Password for your MQTT broker, if it requires authentication.
      Leave blank if you use the Mosquitto app.
  debug_level:
    name: Log Verbosity
    description: >-
      Only needed for troubleshooting. Enter "govee=trace" for
      maximum detail. Warning: trace mode may log sensitive data
      like tokens — redact these before sharing logs.
  no_multicast:
    name: Disable Multicast Discovery
    description: >-
      Disables the standard multicast method for finding Govee
      devices on your network. Only enable this if you are using
      one of the alternative discovery methods below.
  broadcast_all:
    name: Broadcast to Each Network Interface
    description: >-
      Alternative discovery method: sends a discovery packet to
      every network interface on your system. Try this if the
      default multicast discovery does not find your devices.
  scan:
    name: Scan Specific IP Addresses
    description: >-
      Comma-separated list of IP addresses to scan directly.
      Use this to target specific Govee devices (assign them
      static IPs first) or broadcast addresses for other subnets.
  global_broadcast:
    name: Global Broadcast Discovery
    description: >-
      Sends discovery packets to 255.255.255.255. Rarely helps
      if standard multicast already fails — try "Broadcast to
      Each Network Interface" or "Scan Specific IP Addresses"
      instead.









